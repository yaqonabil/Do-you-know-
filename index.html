<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SYSTEM</title>
    <style>
        body {
            background-color: #000814; /* Deep Navy Blue */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: #001d3d; /* Navy Blue Container */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); /* Red Glow */
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 3px solid #ff0000; /* Red Border */
        }

        h2 { 
            color: #ff3333; 
            font-size: 22px; 
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px black;
        }

        .options-container { display: grid; gap: 15px; }

        button {
            padding: 15px;
            border: 2px solid #ff0000;
            border-radius: 5px;
            background-color: transparent;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #ff0000;
            color: #000814;
        }

        #message {
            margin-top: 25px;
            font-size: 18px;
            color: #ff3333;
            font-weight: bold;
        }

        #reward-area {
            margin-top: 20px;
            padding: 15px;
            background: #003566;
            border: 2px dashed #ff0000;
            border-radius: 8px;
        }

        code {
            display: block;
            background: #000;
            padding: 10px;
            margin: 10px 0;
            color: #00ff00; /* Green code for reward */
            font-size: 12px;
            word-break: break-all;
        }

        .copy-btn { background-color: #ff0000; border: none; padding: 10px; cursor: pointer; color: white; border-radius: 4px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-box">
        <h2 id="question-text">Initializing...</h2>
        <div id="options" class="options-container"></div>
        <p id="message"></p>
        
        <div id="reward-area" style="display: none;">
            <p>REWARD UNLOCKED:</p>
            <code id="reward-text">1fISLOHkNNHMrsXQv4NzyCBPXHq5vMeoN</code>
            <button class="copy-btn" onclick="copyCode()">COPY REWARD</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "When is my birthday?", options: ["11/22/2007", "11/22/2008"], correct: 0 },
        { q: "What is my favorite color?", options: ["Red", "Black"], correct: 0 },
        { q: "Do you love me?", options: ["Yes", "No"], correct: 0 },
        { q: "What's the name that i like to be called?", options: ["Coby", "Baba"], correct: 0 },
        { q: "What is your favorite band?", options: ["BTS", "One Direction", "Queen", "The Beatles"], correct: 1 },
        { q: "What is your favorite song lyrics?", options: ["Perfect-one direction", "Cant see me 2pac", "Hala madrid", "Bohemain rhapsody - queen"], correct: 0 },
        { q: "What place do you love the most?", options: ["Place that has flower fields", "Place that has mountains", "Place that has water", "Place that has water and flower fields"], correct: 3 }
    ];

    const responses = [
        "how did you know that? 🤨",
        "who are you lil bro? 🤨",
        "nah i think I'm starting to know you 😋",
        "nah you're just lucky kid",
        "bro it's impossible are you taking a piss rn? Get a life leave me alone",
        "you're so close to the end anonymous one",
        "YOU GOT IT KIDDO I ALWAYS BELIEVED IN YOU TAKE THAT REWARD AND FIGURE IT OUT LOVE ❤️"
    ];

    let currentStep = 0;
    const qText = document.getElementById('question-text');
    const optBox = document.getElementById('options');
    const msg = document.getElementById('message');

    if (localStorage.getItem('status') === 'blocked') {
        showFailure();
    } else {
        render();
    }

    function render() {
        if (currentStep >= questions.length) {
            showWin();
            return;
        }
        const current = questions[currentStep];
        qText.innerText = current.q;
        optBox.innerHTML = '';
        current.options.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.onclick = () => {
                if (idx === current.correct) {
                    msg.innerText = responses[currentStep];
                    currentStep++;
                    setTimeout(() => { msg.innerText = ''; render(); }, 1800);
                } else {
                    localStorage.setItem('status', 'blocked');
                    showFailure();
                }
            };
            optBox.appendChild(b);
        });
    }

    function showFailure() {
        qText.innerText = "ACCESS PERMANENTLY DENIED";
        optBox.innerHTML = '';
        msg.innerText = "One mistake was all it took.";
        document.body.style.backgroundColor = "#200";
        document.getElementById('game-container').style.borderColor = "black";
    }

    function showWin() {
        qText.innerText = "SYSTEM OVERRIDDEN";
        optBox.innerHTML = '';
        msg.innerText = responses[6];
        document.getElementById('reward-area').style.display = 'block';
    }

    function copyCode() {
        navigator.clipboard.writeText(document.getElementById('reward-text').innerText);
        alert("REWARD COPIED TO CLIPBOARD.");
    }
</script>

</body>
</html>
