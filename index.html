<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FINAL ULTIMATUM</title>
    <style>
        body {
            background-color: #0d1117; /* Darkest Navy Blue */
            font-family: 'Courier New', Courier, monospace; /* Classic Terminal Font */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #ff3333; /* Intense Red for general text */
        }

        #game-container {
            background: #161b22; /* Slightly Lighter Dark Navy */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5); /* Massive Red Glow */
            text-align: center;
            max-width: 450px;
            width: 85%;
            border: 4px solid #ff0000; /* Bright Red Border */
            transition: all 0.3s ease;
        }

        /* Failure state background change */
        .game-over-bg { background-color: #330000 !important; }

        h2 { color: #ffffff; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

        .options-container { display: grid; gap: 15px; margin-top: 25px;}

        button {
            padding: 18px;
            border: 3px solid #666;
            border-radius: 8px;
            background-color: transparent;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            border-color: #ff0000; /* Red border on hover */
            background-color: rgba(255, 0, 0, 0.1);
            color: #ff3333;
        }

        /* Target a specific answer button (Option A) in your image style */
        .target-button {
            border-color: #ff0000;
            background-color: rgba(255, 0, 0, 0.2);
            color: white;
        }

        #reward-box {
            margin-top: 30px;
            padding: 20px;
            background: #238636; /* Dark Green for reward */
            border: 2px dashed white;
            border-radius: 10px;
            color: white;
        }

        #reward-text {
            word-break: break-all;
            font-family: monospace;
            background: #eee;
            color: black;
            padding: 8px;
            display: block;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .copy-btn { background-color: white; color: black; border-color: white; margin-top: 10px; font-weight: 1000; }
        .copy-btn:hover { background-color: black; color: white; border-color: white; }

        #message { margin-top: 25px; font-size: 20px; color: #ff3333; font-weight: bold;}
        .failed-text { color: #660000 !important; font-size: 28px; font-weight: bold;}
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="quiz-box">
        <h2 id="question-text">SYSTEM SECURED</h2>
        <div id="options" class="options-container"></div>
        <p id="message"></p>
        
        <div id="reward-area" style="display: none;">
            <div id="reward-box">
                <p><strong>REWARD OBTAINED:</strong></p>
                <code id="reward-text">1fISLOHkNNHMrsXQv4NzyCBPXHq5vMeoN</code>
                <button class="copy-btn" onclick="copyCode()">COPY TO CLIPBOARD</button>
            </div>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "BIRTHDATE VERIFICATION REQUIRED", options: ["11/22/2007", "11/22/2008"], correct: 0 },
        { q: "IDENTIFY THE PREFERRED HUE", options: ["RED", "BLACK"], correct: 0 },
        { q: "AFFIRMATION STATUS", options: ["YES", "NO"], correct: 0 },
        { q: "DESIGNATED ALIAS", options: ["COBY", "BABA"], correct: 0 },
        { q: "REQUIRED MUSICAL COLLECTIVE", options: ["BTS", "ONE DIRECTION", "QUEEN", "THE BEATLES"], correct: 1 },
        { q: "REQUIRED LYRICAL PHRASE", options: ["PERFECT - ONE DIRECTION", "CAN'T SEE ME - 2PAC", "HALA MADRID", "BOHEMIAN RHAPSODY - QUEEN"], correct: 0 },
        { q: "REQUIRED GEOGRAPHIC TERRAIN", options: ["FLOWER FIELDS", "MOUNTAINS", "WATER", "WATER AND FLOWER FIELDS"], correct: 3 }
    ];

    // THE MESSAGES YOU REQUESTED
    const compliments = [
        "how did you know that? 🤨",
        "who are you lil bro? 🤨",
        "nah i think I'm starting to know you 😋",
        "nah you're just lucky kid",
        "bro it's impossible are you taking a piss rn? Get a life leave me alone",
        "you're so close to the end anonymous one",
        "YOU GOT IT KIDDO I ALWAYS BELIEVED IN YOU TAKE THAT REWARD AND FIGURE IT OUT LOVE ❤️"
    ];
    
    let currentQuestion = 0;
    const container = document.getElementById('game-container');
    const questionEl = document.getElementById('question-text');
    const optionsEl = document.getElementById('options');
    const messageEl = document.getElementById('message');
    const rewardArea = document.getElementById('reward-area');

    if (localStorage.getItem('gameStatus') === 'failed') {
        renderFailure();
    } else {
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestion >= questions.length) {
            renderWin();
            return;
        }
        const data = questions[currentQuestion];
        questionEl.innerText = data.q;
        optionsEl.innerHTML = '';
        messageEl.innerText = '';
        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(index) {
        if (index === questions[currentQuestion].correct) {
            currentQuestion++;
            // DISPLAY THE SPECIFIC MESSAGE YOU REQUESTED
            messageEl.innerText = compliments[currentQuestion - 1]; 
            setTimeout(loadQuestion, 1500);
        } else {
            failGame();
        }
    }

    function failGame() {
        localStorage.setItem('gameStatus', 'failed');
        renderFailure();
    }

    function renderFailure() {
        questionEl.innerText = "SYSTEM FAILURE";
        optionsEl.innerHTML = '';
        messageEl.innerText = "ACCESS DENIED FOREVER";
        messageEl.classList.add('failed-text');
        
        container.classList.add('game-over-bg');
        container.style.boxShadow = "none";
        document.body.style.backgroundColor = "black";
    }

    function renderWin() {
        questionEl.innerText = "ACCESS GRANTED";
        optionsEl.innerHTML = '';
        // Final message from your list
        messageEl.innerText = compliments[6]; 
        rewardArea.style.display = "block";
    }

    function copyCode() {
        const code = document.getElementById('reward-text').innerText;
        navigator.clipboard.writeText(code);
        alert("REWARD COPIED");
    }
</script>

</body>
</html>
